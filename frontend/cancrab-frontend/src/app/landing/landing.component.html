<div class="landing">
  <div class="landing-intro">
    <p class="landing-subtitle">Upload your CAN log and DBC file to begin analysis</p>
  </div>

  <div class="upload-grid">
    <!-- CAN Log Upload -->
    <div class="upload-card" [class.has-file]="canFile()">
      <input
        type="file"
        id="can-file"
        class="file-input"
        (change)="onCanFileChange($event)"
        accept=".log,.txt,.asc"
      />
      <label for="can-file" class="upload-zone">
        <div class="upload-icon" [class.active]="canFile()">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="upload-label">CAN Log File</p>
        @if (canFile()) {
          <p class="file-name">{{ canFile()!.name }}</p>
        } @else {
          <p class="upload-hint">Click to upload · .log .txt .asc</p>
        }
      </label>
    </div>

    <!-- DBC File Upload -->
    <div class="upload-card" [class.has-file]="dbcFile()">
      <input
        type="file"
        id="dbc-file"
        class="file-input"
        (change)="onDbcFileChange($event)"
        accept=".dbc"
      />
      <label for="dbc-file" class="upload-zone">
        <div class="upload-icon" [class.active]="dbcFile()">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="upload-label">DBC File</p>
        @if (dbcFile()) {
          <p class="file-name">{{ dbcFile()!.name }}</p>
        } @else {
          <p class="upload-hint">Click to upload · .dbc</p>
        }
      </label>
    </div>
  </div>

  @if (error()) {
    <div class="error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error() }}
    </div>
  }

  <button
    class="submit-btn"
    (click)="submit()"
    [disabled]="!canSubmit()"
  >
    @if (uploading()) {
      <span class="spinner"></span>
      Uploading…
    } @else if (processing()) {
      <span class="spinner"></span>
      Processing…
    } @else {
      Clack it 🦀
    }
  </button>
</div>
