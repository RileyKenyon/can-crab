<div class="shell">
  <!-- Mobile top bar -->
  <header class="mobile-topbar">
    <button class="hamburger" (click)="sidebarOpen.set(true)" aria-label="Open menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a routerLink="/" class="brand">🦀 CAN Crab</a>
  </header>

  <!-- Sidebar overlay (mobile) -->
  @if (sidebarOpen()) {
    <div class="sidebar-overlay" (click)="sidebarOpen.set(false)"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-header">
      <a routerLink="/" class="brand" (click)="sidebarOpen.set(false)">🦀 CAN Crab</a>
      <button class="sidebar-close" (click)="sidebarOpen.set(false)" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      @if (auth.isLoggedIn()) {
        <button class="nav-item" (click)="auth.logout(); sidebarOpen.set(false)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign out</span>
        </button>
      } @else {
        <a routerLink="/login" class="nav-item" (click)="sidebarOpen.set(false)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span>Sign in</span>
        </a>
      }
    </nav>

    @if (sessions.sessions().length > 0) {
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Consortiums</span>
        </div>
        <div class="session-list">
          @for (session of sessions.sessions(); track session.id) {
            <button
              class="session-item"
              [class.active]="sessions.activeSessionId() === session.id"
              (click)="navigateToSession(session.id)"
            >
              <span class="session-icon">🦀</span>
              <div class="session-info">
                <p class="session-name">{{ session.name }}</p>
                <p class="session-time">{{ session.timestamp | date:'shortTime' }}</p>
              </div>
            </button>
          }
        </div>
      </div>
    }

    <!-- Theme toggle at bottom of sidebar -->
    <div class="sidebar-footer">
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Light mode
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Dark mode
        }
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
