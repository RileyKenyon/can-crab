server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* calls to the Rust backend.
    # proxy_pass has no URI component so nginx forwards the full path unchanged.
    location /api {
        proxy_pass            http://backend:8081;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Allow enough time for large log file uploads and async processing polls.
        proxy_read_timeout    300s;
        proxy_send_timeout    120s;
        client_max_body_size  100m;
    }

    # WebSocket proxy for the live CAN viewer.
    # Only reachable when the viewer service is started (--profile can).
    # Using a variable defers DNS resolution to request time so nginx starts
    # successfully even when the viewer container is not running.
    location = /ws {
        resolver           127.0.0.11 valid=10s;
        set $viewer        viewer:3000;
        proxy_pass         http://$viewer/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Angular SPA — unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
